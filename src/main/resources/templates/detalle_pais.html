<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Detalle de ' + ${nombrePais}">Detalle del País</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* 1. Fondo general (Estilo RevenueX) */
        body {
            background-color: #0b0e14 !important;
            color: #ffffff !important;
            font-family: 'Inter', sans-serif;
        }

        /* 2. Barra de navegación */
        .navbar {
            background-color: #0b0e14 !important;
            border-bottom: 1px solid #1f232e;
        }
        .navbar-brand { color: #ffffff !important; font-weight: 600; }
        .nav-link { color: #8a94a6 !important; transition: color 0.2s; }
        .nav-link:hover { color: #ffffff !important; }
        .nav-link.active { color: #2563eb !important; font-weight: 600; }

        /* 3. Tarjetas y contenedores (Fondo secundario oscuro) */
        .dashboard-card, .table-container, .card {
            background-color: #151a23 !important;
            border: 1px solid #1f232e !important;
            border-radius: 16px !important;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            padding: 1.5rem;
        }
        .card-body { padding: 0 !important; } /* Ajuste porque el dashboard-card ya tiene padding */

        /* 4. Textos */
        .text-primary { color: #ffffff !important; } /* Título principal en blanco */
        .text-dark { color: #60a5fa !important; } /* Nombre del país en azul claro */
        .text-muted { color: #8a94a6 !important; }

        /* 5. Botones */
        .btn-outline-secondary {
            background-color: transparent !important;
            color: #8a94a6 !important;
            border: 1px solid #1f232e !important;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn-outline-secondary:hover {
            background-color: #1f232e !important;
            color: #ffffff !important;
        }

        /* 6. Estilos de la Tabla (Minimalista) */
        .table { color: #e2e8f0 !important; border-color: #1f232e !important; margin-bottom: 0; }
        .table>thead { background-color: transparent !important; }
        .table>thead>tr>th {
            color: #8a94a6 !important;
            border-bottom: 1px solid #1f232e !important;
            font-weight: 500;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            padding-bottom: 1rem;
        }
        .table>tbody>tr>td {
            border-bottom: 1px solid #1f232e !important;
            padding: 1rem 0.5rem;
            background-color: transparent !important;
        }
        .table>tbody>tr:hover>td { background-color: rgba(255, 255, 255, 0.03) !important; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand" href="/">✈️ Aviation Eurostat</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/vuelos">Lista de Vuelos</a></li>
                <li class="nav-item"><a class="nav-link" href="/vuelos/top">🌟 Top Vuelos</a></li>
                <li class="nav-item"><a class="nav-link" href="/buscar">Búsqueda Avanzada</a></li>
                <li class="nav-item ms-lg-3 mt-2 mt-lg-0" sec:authorize="isAuthenticated()">
                    <a class="btn btn-outline-danger btn-sm px-3" href="/logout" style="border-radius: 6px;">Cerrar Sesión</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5 mb-5">
    <a href="/vuelos" class="btn btn-outline-secondary mb-4">← Volver al listado</a>

    <div class="dashboard-card mb-4 text-center">
        <h2 class="text-primary mb-0 d-flex justify-content-center align-items-center gap-3">
            <img th:src="@{'https://flagcdn.com/w40/' + ${codigoBandera} + '.png'}"
                 alt="Bandera"
                 class="shadow-sm rounded"
                 width="45" style="box-shadow: 0 4px 10px rgba(0,0,0,0.5);">

            <span>
                Historial de Vuelos:
                <span th:text="${nombreCompleto}" class="fw-bold text-dark">España</span>
                <span class="text-muted fs-5" th:text="'(' + ${nombrePais} + ')'">(ES)</span>
            </span>
        </h2>
        <p class="text-muted mt-2 mb-0" th:text="'Se han encontrado ' + ${#lists.size(vuelos)} + ' registros.'"></p>
    </div>

    <div class="dashboard-card mb-4">
        <div class="card-body">
            <canvas id="graficoPasajeros" height="100"></canvas>
        </div>
    </div>

    <div class="table-container table-responsive">
        <table class="table align-middle mb-0">
            <thead>
            <tr>
                <th class="text-center">Mes (Time)</th>
                <th class="text-end pe-4">Pasajeros (Value)</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="vuelo : ${vuelos}">
                <td class="text-center text-light" th:text="${vuelo.time}">2025-01</td>
                <td class="text-end pe-4 fw-medium text-light" th:text="${#numbers.formatInteger(vuelo.value, 0, 'POINT')}">1000</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script th:inline="javascript">
    /*<![CDATA[*/
    var vuelosData = /*[[${vuelos}]]*/ [];
    vuelosData.sort((a, b) => a.time.localeCompare(b.time));

    var etiquetas = vuelosData.map(v => v.time);
    var valores = vuelosData.map(v => v.value);
    var nombrePais = /*[[${nombreCompleto}]]*/ 'País';

    var ctx = document.getElementById('graficoPasajeros').getContext('2d');

    // Crear un gradiente de color para el relleno bajo la línea
    var gradient = ctx.createLinearGradient(0, 0, 0, 400);
    gradient.addColorStop(0, 'rgba(37, 99, 235, 0.4)'); // Azul arriba
    gradient.addColorStop(1, 'rgba(37, 99, 235, 0)');   // Transparente abajo

    new Chart(ctx, {
        type: 'line',
        data: {
            labels: etiquetas,
            datasets: [{
                label: 'Pasajeros mensuales en ' + nombrePais,
                data: valores,
                borderColor: '#2563eb', // El azul eléctrico de RevenueX
                backgroundColor: gradient,
                borderWidth: 3,
                tension: 0.4, // Curvas más suaves
                fill: true,
                pointBackgroundColor: '#0b0e14', // Puntos negros
                pointBorderColor: '#2563eb',     // Con borde azul
                pointBorderWidth: 2,
                pointRadius: 4,
                pointHoverRadius: 6
            }]
        },
        options: {
            responsive: true,
            color: '#8a94a6', // Color del texto de las leyendas (gris Dribbble)
            plugins: {
                legend: {
                    position: 'top',
                    labels: { color: '#8a94a6', font: { family: 'Inter', size: 14 } }
                },
                tooltip: {
                    backgroundColor: '#151a23',
                    titleColor: '#ffffff',
                    bodyColor: '#e2e8f0',
                    borderColor: '#1f232e',
                    borderWidth: 1,
                    padding: 10,
                    displayColors: false
                }
            },
            scales: {
                x: {
                    grid: { color: '#1f232e', drawBorder: false }, // Cuadrícula oscura
                    ticks: { color: '#8a94a6', font: { family: 'Inter' } }
                },
                y: {
                    beginAtZero: false,
                    grid: { color: '#1f232e', drawBorder: false },
                    ticks: { color: '#8a94a6', font: { family: 'Inter' } }
                }
            }
        }
    });
    /*]]>*/
</script>
</body>
</html>
