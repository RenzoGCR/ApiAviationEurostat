<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Búsqueda Avanzada</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
        <a class="navbar-brand" href="#">✈️ Aviation Eurostat</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/vuelos">Lista de Vuelos</a></li>
                <li class="nav-item"><a class="nav-link" href="/vuelos/top">Top Vuelos</a></li>
                <li class="nav-item"><a class="nav-link active" href="/buscar">Búsqueda Avanzada</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5 mb-5">
    <h2 class="text-secondary mb-4">Búsqueda Avanzada de Vuelos</h2>

    <div th:if="${error}" class="alert alert-danger shadow-sm" role="alert" th:text="${error}"></div>
    <div th:if="${mensajeExito}" class="alert alert-success shadow-sm" role="alert" th:text="${mensajeExito}"></div>

    <div class="card shadow-sm mb-5">
        <div class="card-body bg-white">
            <form th:action="@{/buscar}" th:object="${filtro}" method="post" class="row g-3">

                <div class="col-md-4">
                    <label class="form-label fw-bold">Fecha Inicio (YYYY-MM)</label>
                    <input type="text" class="form-control" th:field="*{timeStart}" placeholder="Ej: 2024-01">
                </div>

                <div class="col-md-4">
                    <label class="form-label fw-bold">Fecha Fin (YYYY-MM)</label>
                    <input type="text" class="form-control" th:field="*{timeEnd}" placeholder="Ej: 2025-01">
                </div>

                <div class="col-md-4">
                    <label class="form-label fw-bold">Mínimo de Pasajeros</label>
                    <input type="number" class="form-control" th:field="*{minPassengers}" placeholder="Ej: 500000">
                </div>

                <div class="col-12 text-end mt-4">
                    <button type="reset" class="btn btn-outline-secondary me-2">Limpiar</button>
                    <button type="submit" class="btn btn-primary px-4">🔍 Buscar</button>
                </div>
            </form>
        </div>
    </div>

    <div th:if="${vuelos != null}" class="table-responsive shadow bg-white rounded">
        <table class="table table-striped table-hover align-middle mb-0">
            <thead class="table-dark">
            <tr>
                <th class="text-center">País</th>
                <th class="text-center">Mes</th>
                <th class="text-end pe-4">Pasajeros</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="vuelo : ${vuelos}">
                <td class="text-center fw-bold text-primary" th:text="${vuelo.geo}"></td>
                <td class="text-center" th:text="${vuelo.time}"></td>
                <td class="text-end pe-4" th:text="${#numbers.formatInteger(vuelo.value, 0, 'POINT')}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(vuelos)}">
                <td colspan="3" class="text-center text-muted py-4">No se encontraron resultados para estos filtros.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
