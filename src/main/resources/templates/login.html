<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Aviation Eurostat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* 1. Fondo general */
        body {
            background-color: #0b0e14 !important;
            color: #ffffff !important;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        /* 2. Tarjeta central del Login */
        .login-card {
            background-color: #151a23 !important;
            border: 1px solid #1f232e !important;
            border-radius: 16px !important;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
        }

        /* 3. Inputs de formulario */
        .form-label {
            color: #8a94a6;
            font-weight: 500;
            font-size: 0.9rem;
        }
        .form-control {
            background-color: #0b0e14 !important;
            border: 1px solid #1f232e !important;
            color: #ffffff !important;
            border-radius: 8px;
            padding: 0.8rem 1rem;
            transition: all 0.2s;
        }
        .form-control:focus {
            border-color: #2563eb !important;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1) !important;
        }

        /* 4. Botón */
        .btn-primary {
            background-color: #2563eb !important;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            padding: 0.8rem;
            width: 100%;
            transition: all 0.2s;
        }
        .btn-primary:hover {
            background-color: #3b82f6 !important;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);
            transform: translateY(-2px);
        }

        /* 5. Textos y Logo */
        .brand-logo { color: #ffffff; font-weight: 700; font-size: 1.5rem; letter-spacing: -0.5px; text-decoration: none;}
        .text-muted { color: #8a94a6 !important; }
    </style>
</head>
<body>

<div class="login-card text-center">
    <div class="mb-4">
        <a href="/" class="brand-logo">✈️ Aviation Eurostat</a>
        <p class="text-muted mt-2">Inicia sesión para acceder a la búsqueda avanzada.</p>
    </div>

    <div th:if="${param.error}" class="alert alert-danger shadow-sm border-0 rounded-3 text-start px-3 py-2" role="alert" style="font-size: 0.9em;">
        ⚠️ Usuario o contraseña incorrectos.
    </div>
    <div th:if="${param.logout}" class="alert alert-success shadow-sm border-0 rounded-3 text-start px-3 py-2" role="alert" style="font-size: 0.9em;">
        ✅ Has cerrado sesión correctamente.
    </div>

    <form th:action="@{/login}" method="post" class="text-start mt-4">

        <div class="mb-3">
            <label for="username" class="form-label">Usuario</label>
            <input type="text" class="form-control" id="username" name="username" placeholder="Ej: admin" required autofocus>
        </div>

        <div class="mb-4">
            <label for="password" class="form-label">Contraseña</label>
            <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-primary mt-2">Iniciar Sesión</button>
    </form>

    <div class="mt-4 border-top border-dark pt-3">
        <a href="/" class="text-muted text-decoration-none" style="font-size: 0.9em;">← Volver al inicio</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
